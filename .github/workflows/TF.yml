name: Update TF Playlists

on:
  schedule:
    # Runs every 2 hours (at minute 0)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

permissions:
  contents: write # Needed to push changes back to the repo

jobs:
  update-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Create playlist directory if not exists
        run: mkdir -p playlist/TF

      - name: Fetch and Update M3U8 Files
        run: |
          # Array mapping source files to destination files
          # Format: "source_name:destination_name"
          channels=(
            "ch1.m3u8:TF-1.m3u8"
            "ch2.m3u8:TF-2.m3u8"
            "ch6.m3u8:TF-6.m3u8"
          )

          BASE_URL="https://cdn-tt.pages.dev"

          for pair in "${channels[@]}"; do
            # Split the pair by colon
            src="${pair%%:*}"
            dest="${pair##*:}"
            
            echo "Fetching $BASE_URL/$src -> playlist/TF/$dest"
            
            # Fetch content, filter out the JSON block, and save to destination
            curl -sL "$BASE_URL/$src" | sed '/^{/,/^}/d' > "playlist/TF/$dest"
          done

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add playlist/TF/
          
          # Only commit if there are actual changes to prevent empty commits
          if git diff-index --quiet HEAD --; then
            echo "No changes detected in the playlist files."
          else
            git commit -m "Automated Playlist Update: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push
          fi
