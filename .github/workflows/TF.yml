name: UPDATE TF LINK IN WC PLAYLIST

on:
  schedule:
    # Runs automatically every 30 minutes.
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows you to run the workflow manually from the Actions tab

permissions:
  contents: write

jobs:
  update-m3u:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Update Script
        run: |
          cat << 'EOF' > update.py
          import urllib.request

          # URLs and Paths
          source_url = "https://raw.githubusercontent.com/sm-monirulislam/Toffee-Auto-Update-Playlist/refs/heads/main/toffee_playlist.m3u"
          local_file = "playlist/wc.m3u"

          # Fetch the source playlist
          req = urllib.request.Request(source_url, headers={'User-Agent': 'Mozilla/5.0'})
          try:
              with urllib.request.urlopen(req) as response:
                  source_content = response.read().decode('utf-8').splitlines()
          except Exception as e:
              print(f"Failed to fetch source playlist: {e}")
              exit(1)

          # Helper function to find the m3u8 link immediately following a specific channel name
          def get_url_for_channel(lines, channel_name):
              for i, line in enumerate(lines):
                  if channel_name in line:
                      # Search ahead for the next uncommented line (the stream URL)
                      for j in range(i+1, len(lines)):
                          if lines[j].strip() and not lines[j].strip().startswith('#'):
                              return lines[j].strip()
              return None

          # Extract the new URLs
          url_ch1 = get_url_for_channel(source_content, "FIFA WC CHANNEL 1")
          url_ch2 = get_url_for_channel(source_content, "FIFA WC CHANNEL 2")
          url_ch6 = get_url_for_channel(source_content, "FIFA WC CHANNEL 6")

          if not url_ch1 or not url_ch2 or not url_ch6:
              print("Could not find all the target channels in the source playlist. Aborting.")
              exit(1)

          # Read your local file
          try:
              with open(local_file, 'r', encoding='utf-8') as f:
                  local_lines = f.readlines()
          except FileNotFoundError:
              print(f"File '{local_file}' not found in the repository.")
              exit(1)

          # Helper function to replace the m3u8 link for a specific channel in the local file
          def replace_url_in_local(lines, channel_name, new_url):
              for i, line in enumerate(lines):
                  if channel_name in line:
                      for j in range(i+1, len(lines)):
                          if lines[j].strip() and not lines[j].strip().startswith('#'):
                              lines[j] = new_url + "\n"
                              return

          # Update the URLs for your specific channels
          replace_url_in_local(local_lines, "🇧🇩 TOFFEE LIVEᵇᵈᶦˣ", url_ch1)
          replace_url_in_local(local_lines, "🇧🇩 TOFFEE LIVE 2ᵇᵈᶦˣ", url_ch2)
          replace_url_in_local(local_lines, "TOFFEE Match Recapeᵇᵈᶦˣ", url_ch6)

          # Write the untouched lines + updated URLs back to your local file
          with open(local_file, 'w', encoding='utf-8') as f:
              f.writelines(local_lines)
          EOF
          
          python3 update.py
          rm update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist/wc.m3u
          # This ensures the workflow only creates a commit if the script actually changed a URL
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update TOFFEE links from source playlist" && git push)
