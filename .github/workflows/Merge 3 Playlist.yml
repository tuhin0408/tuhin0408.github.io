name: Merge 3 Playlist

on:
  schedule:
    # Runs every hour, at the start of the hour
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Download and clean tapmad.m3u
        run: |
          curl -s "https://raw.githubusercontent.com/srhady/tapmad-bd/refs/heads/main/tapmad_bd.m3u" | \
          grep -E -v "Playlist Name|Last Update|Telegram|Owner|Special thanks to Shuvo vai for contributing his premium Tapmad account.|======" > tapmad.m3u

      - name: Download and clean fancode.m3u
        run: |
          # Fetch first file, clean headers, write fresh
          curl -s "https://raw.githubusercontent.com/sm-monirulislam/FanCode-Auto-Update-Playlist/refs/heads/main/fancode_bd.m3u" | \
          grep -E -v "Developed by|Telegram|Last Updated|Live Matches|======" > fancode.m3u
          
          echo "" >> fancode.m3u
          
          # Fetch second file, clean headers, append to file
          curl -s "https://raw.githubusercontent.com/sm-monirulislam/FanCode-Auto-Update-Playlist/refs/heads/main/fancode_in.m3u" | \
          grep -E -v "Developed by|Telegram|Last Updated|Live Matches|======" >> fancode.m3u

      - name: Download and clean TF.m3u
        run: |
          curl -s "https://raw.githubusercontent.com/BINOD-XD/Toffee-Auto-Update-Playlist/refs/heads/main/toffee_NS_Player.m3u" | \
          grep -E -v "Developed by|Telegram|Last Updated|Live Matches|======" > TF.m3u

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add tapmad.m3u fancode.m3u TF.m3u
          
          if git diff-index --quiet HEAD --; then
            echo "No changes detected. Skipping commit."
          else
            git commit -m "Automated Clean Playlist Update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git push
          fi
