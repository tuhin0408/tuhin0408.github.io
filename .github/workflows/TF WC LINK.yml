name: Update Edge Cache Playlists

on:
  schedule:
    # Runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to trigger it manually from the Actions tab

jobs:
  update-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Fetch Latest Source Playlist and Extract Edge Cache
        run: |
          # 1. Download the target playlist file
          curl -s -A "Mozilla/5.0" "https://raw.githubusercontent.com/srhady/toffee-bd/refs/heads/main/toffee_playlist.m3u" -o source.m3u

          # 2. Write Python script to specifically extract edge-cache-token strings
          cat << 'EOF' > extract.py
import re
import sys

try:
    with open("source.m3u", "r", encoding="utf-8") as f:
        content = f.read()
except Exception as e:
    print(f"Error reading source file: {e}", file=sys.stderr)
    sys.exit(1)

token = ""

# Strategy A: Target the block right after your channel ID
if "V__o054BObUt2AG6LL5C" in content:
    try:
        segment = content.split("V__o054BObUt2AG6LL5C")[1][:1200]
        match = re.search(r"edge-cache-token=[^\s\"'#]+", segment)
        if match:
            token = "?" + match.group(0)
    except Exception:
        pass

# Strategy B Fallback: Grab the first valid edge-cache-token string anywhere in the playlist
if not token:
    match = re.search(r"edge-cache-token=[^\s\"'#]+", content)
    if match:
        token = "?" + match.group(0)

if token:
    print(token)
EOF

          # 3. Execute script and register token
          TOKEN=$(python3 extract.py)

          echo "Extracted Token: $TOKEN"

          if [ -z "$TOKEN" ]; then
            echo "Error: Could not extract edge-cache-token from source."
            exit 1
          fi

          # 4. Replace token safely inside target files
          TARGET_DIR="playlist/TF"
          
          if [ -f "$TARGET_DIR/TF-1.m3u8" ]; then
            sed -i -E "s/\?edge-cache-token=[^\"' ]*/$TOKEN/g" "$TARGET_DIR/TF-1.m3u8"
            echo "Updated TF-1.m3u8"
          else
            echo "Warning: TF-1.m3u8 not found at $TARGET_DIR/TF-1.m3u8"
          fi

          if [ -f "$TARGET_DIR/TF-6.m3u8" ]; then
            sed -i -E "s/\?edge-cache-token=[^\"' ]*/$TOKEN/g" "$TARGET_DIR/TF-6.m3u8"
            echo "Updated TF-6.m3u8"
          else
            echo "Warning: TF-6.m3u8 not found at $TARGET_DIR/TF-6.m3u8"
          fi
          
      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          git add playlist/TF/TF-1.m3u8 playlist/TF/TF-6.m3u8
          
          # Only commit if changes exist to avoid empty commit failures
          if ! git diff --cached --quiet; then
            git commit -m "Automated Sync: Update edge-cache parameters"
            git push
          else
            echo "No changes detected in tokens."
          fi
